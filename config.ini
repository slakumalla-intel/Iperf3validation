# Iperf3 Test Suite Configuration
# Edit this file to customize test parameters

[Network Nodes]
# IP addresses of the 4 test nodes
node_1 = 200.0.0.101
node_2 = 200.0.0.103
node_3 = 200.0.0.104
node_4 = 200.0.0.106

[SSH Configuration]
# SSH user for accessing nodes (default: root)
ssh_user = root

# SSH port (default: 22)
ssh_port = 22

# SSH key path (optional, leave empty for password auth)
# ssh_key = /path/to/id_rsa

# SSH timeout in seconds
ssh_timeout = 5

[Test Parameters]
# Test duration per connection in seconds
# Recommended: 60-600 seconds (longer = more stable results)
duration = 300

# Number of parallel iperf3 streams
# For 160-core systems, 16 streams = 10 cores per stream
# Tune based on your system:
#   - More streams = higher throughput potential but higher CPU use
#   - Fewer streams = lower CPU usage but lower throughput
parallel_threads = 16

# Iperf3 server port
iperf3_port = 5201

[Iperf3 Options]
# Window size for TCP (0 = OS default)
window_size = 0

# Buffer size (0 = OS default)
buffer_size = 0

# Congestion control algorithm (recommended: cubic, bbr)
congestion_control = cubic

# Enable bidirectional testing (true/false)
bidirectional = true

[Analysis Settings]
# Link saturation threshold for warnings (in %)
saturation_high_threshold = 80
saturation_warning_threshold = 60

# CPU utilization thresholds (in %)
cpu_high_threshold = 90
cpu_warning_threshold = 70

# Performance consistency threshold (coefficient of variation in %)
consistency_threshold = 20

# Asymmetry threshold for paths (in %)
asymmetry_threshold = 20

[Output Settings]
# Generate text reports
generate_text_report = true

# Generate JSON results
generate_json_results = true

# Generate bottleneck analysis
generate_bottleneck_analysis = true

# Output directory (empty = current directory)
output_directory = ./results

[Advanced Settings]
# Verbose output
verbose = true

# Keep iperf3 servers running between tests (true/false)
persistent_servers = false

# Network interface to use (empty = default)
# interface = eth0

# Buffer pre-allocation
buffer_prealloc = true

# Affinity (CPU core assignment)
cpu_affinity = false
